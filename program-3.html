<!-- 3. Write a program to display one message using:
     A. console.log()
     B. alert()
     C. innerHTML
-->

<!DOCTYPE html>
<html lang="en">
<head>       
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Output Methods</title>        //title
</head>
<body>   
    <p id="demo"></p>         //paragraph tag with ID

    <script>   
        console.log("Hello JavaScript");        //display with console.log()

        alert("Attention! This is Alert Box.");    //display with alert

        document.getElementById("demo").innerHTML="Have a good day.";      //display with innerHTML
    </script>
</body>
</html>
